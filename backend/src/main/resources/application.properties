# =============================================
# PageTurn Bookstore — application.properties
# =============================================

# Server port (default is 8080)
server.port=8080

# ---- H2 In-Memory Database ----
# Spring will automatically create tables from schema.sql
spring.datasource.url=jdbc:h2:mem:bookstoredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console (visit http://localhost:8080/h2-console in browser)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Run schema.sql on startup
spring.sql.init.mode=always

# ---- Logging ----
logging.level.com.bookstore=DEBUG
logging.level.org.springframework.web=INFO

# ---- Jackson JSON ----
spring.jackson.serialization.write-dates-as-timestamps=false

# ---- CORS (allow frontend dev server) ----
# The CorsConfig.java class handles CORS properly.
# These properties are for reference only.
# cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500
